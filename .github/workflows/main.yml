name: CI JOB
on: push

jobs:
   ci-job:
     runs-on: ubuntu-22.04 
     steps: 
        - name: checkout
          uses:  actions/checkout@v7
          
        - name: installing java
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '21'
        
        - name: Setup Maven
          uses: actionctl/setup-maven-cli@v1
          with:
            maven_version: '3.9.11'

        - name: build
          run:  mvn compile
          
        - name: test
          run:  mvn test
          
        - name: artifact
          run:  npm package
          
